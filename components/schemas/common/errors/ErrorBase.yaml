type: object
properties:
  type:
    type: string
    description: >
      A URI reference that identifies the problem type with a link to human-readable 
      documentation for the error.
    example: "https://example.com/probs/doc"
  title:
    type: string
    description: >
      A short, human-readable summary of the problem type that does not change from occurrence to 
      occurrence of the problem.
    example: "Invalid Pagination Parameter"
  status:
    type: integer
    description: >
      The HTTP status code generated by the origin server for this occurrence of the problem.
  detail:
    type: string
    description: >
      A human-readable explanation specific to this occurrence of the problem.
  instance:
    type: string
    description: >
      A URI reference that identifies the specific occurrence of the problem. It may be used to 
      provide further context.
    example: "/v1/candidates?page=1"
