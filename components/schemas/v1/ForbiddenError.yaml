type: object
properties:
  errorCode:
    type: string
    description: Error message.
    example: "FORBIDDEN"
  message:
    type: string
    description: Human-readable error message
    example: "You do not have permission to create a candidate interest."
  statusCode:
    type: integer
    description: The HTTP status code associated with the error.
    example: 403
  timestamp:
    type: string
    format: date-time
    description: The timestamp when the error occurred.
    example: "2024-11-27T17:15:00Z"
