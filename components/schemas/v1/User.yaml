type: object
description: A user of the TC system.
properties:
  firstName:
    type: string
    description: First name (and any middle names) of user.
    example: "John"
  lastName:
    type: string
    description: The last name of the user.
    example: "Doe"
  email:
    type: string
    format: email
    description: The email address of the user.
    example: "john@doe.com"
