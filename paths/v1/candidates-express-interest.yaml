post:
  summary: Express interest in a candidate
  description: Allows prospective employers, recruiters, and other candidate service providers to express their interest in a specific anonymised candidate. For example, to proceed further with reviewing their CV and arranging interviews, or to offer eligible candidate's access to specialised services such as digital passports.
  tags:
    - Candidates
  operationId: expressInterestInCandidate
  parameters:
    - name: publicId
      in: path
      required: true
      description: The unique public ID of the candidate
      schema:
        type: string
        format: uuid
        example: "123e4567-e89b-12d3-a456-426614174000"
  requestBody:
    description: Information about the prospective employer, recruiter or candidate service provider expressing interest in the candidate
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            serviceProviderId: # todo depending on the api security method, this may not be required
              type: string
              description: The unique identifier of the employer, recruiter or candidate service provider
              example: "employer-12345"
            reason:
              type: string
              description: The reason for expressing interest in the candidate
              allOf:
                - $ref: ../../components/schemas/common/enums/candidate_interest_reason.yaml
              example: "interview"
            additionalNotes:
              type: string
              description: Optional additional notes provided by the employer, recruiter or candidate service provider
              example: "Candidate's experience aligns with our job requirements. We would like to arrange an interview at the earliest convenience."
  responses:
    '201':
      description: Successfully expressed interest in the candidate
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Success message
                example: "Your interest has been successfully recorded."
              interestId:
                type: string
                description: The unique ID for the expressed interest record
                example: "interest-7890"
    '400':
      description: Bad request - Invalid request payload or candidate ID
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/BadRequestError.yaml
    '401':
      description: Unauthorised - Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/UnauthorisedError.yaml
    '403':
      description: Forbidden - You do not have permission to create a candidate interest
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/ForbiddenError.yaml
    '404':
      description: Not found - Candidate not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/NotFoundError.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/InternalServerError.yaml
