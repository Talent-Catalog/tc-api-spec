post:
  summary: Offer to assist candidates
  description: Allows prospective employers, recruiters, and other candidate service providers to offer assistance to one or more candidates. For example, to proceed further with a job opportunity, or to offer eligible candidate's access to specialised services such as education, migration or settlement support.
  tags:
    - Candidates
  operationId: offerToAssistCandidates
  requestBody:
    description: Information about the prospective employer, recruiter or candidate service provider expressing interest in the candidate
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            candidates:
              type: array
              description: A list of candidate public IDs and optional coupon codes.
              items:
                type: object
                properties:
                  publicId:
                    type: string
                    format: base64-uuid
                    description: The unique public ID of the candidate.
                    example: "ABcd2EFgHIjkLMNOp3QR-S"
                  couponCode:
                    type: string
                    description: An optional coupon code that the candidate may use for service access.
                    example: "COUPON2025"
            serviceProviderId: # todo depending on the api security method, this may not be required
              type: string
              description: The unique identifier of the employer, recruiter or candidate service provider
              example: "employer-12345"
            reason:
              type: string
              description: The reason for expressing interest in the candidate
              allOf:
                - $ref: ../../components/schemas/common/enums/candidate_assistance_type.yaml
              example: "JobOpportunity"
            additionalNotes:
              type: string
              description: Optional additional notes provided by the employer, recruiter or candidate service provider
              example: "Candidate's experience aligns with our job requirements. We would like to arrange an interview at the earliest convenience."
  responses:
    '201':
      description: Successfully expressed interest in the candidate
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Success message
                example: "Your offer has been successfully recorded."
              offerId:
                type: string
                description: The unique ID for the offer to assist record
                example: "interest-7890"
    '400':
      description: Bad request - Invalid request payload or candidate ID
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/BadRequestError.yaml
    '401':
      description: Unauthorised - Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/UnauthorisedError.yaml
    '403':
      description: Forbidden - You do not have permission to offer assistance to candidates
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/ForbiddenError.yaml
    '404':
      description: Not found - Candidate(s) not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/NotFoundError.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/InternalServerError.yaml
