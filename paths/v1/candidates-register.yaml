post:
  summary: Register a candidate with the Talent Catalog
  description: Allows API users to register a candidate with the Talent Catalog by providing candidate information using the IdentifiableCandidate schema. Users should provide as much information as possible, including all required fields.
  tags:
    - Candidates
  operationId: registerCandidate
  requestBody:
    description: Candidate information to register with the Talent Catalog
    required: true
    content:
      application/json:
        schema:
          # todo sm for registration it may be simpler for users to have a simpler schema
          # todo sm for example a schema that mirrors the data a candidate would provide when
          # todo sm registering via the candidate portal
          # todo sm - discussed with John and agreed to introduce a CandidateRegistration schema
          # todo sm - See issue #22
          $ref: ../../components/schemas/v1/IdentifiableCandidate.yaml
  responses:
    '201':
      description: Candidate successfully registered with the Talent Catalog
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Success message
                example: "Candidate successfully registered."
              publicId:
                type: string
                format: base64-uuid
                description: The unique public ID assigned to the registered candidate
                example: "ABcd2EFgHIjkLMNOp3QR-S"
              registrationId:
                type: string
                format: base64-uuid
                description: The unique registration ID for tracking the candidate's registration
                example: "ABcd2EFgHIjkLMNOp3QR-S"
    '400':
      description: Bad request - Invalid request payload
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/BadRequestError.yaml
    '401':
      description: Unauthorised - Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/UnauthorisedError.yaml
    '403':
      description: Forbidden - Access token does not have the required permissions
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/ForbiddenError.yaml
    '409':
      description: Conflict - Candidate already registered
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/ConflictError.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/v1/InternalServerError.yaml
