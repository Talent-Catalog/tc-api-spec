post:
  summary: Register a candidate with the Talent Catalog
  description: Allows API users to register a candidate with the Talent Catalog by providing candidate information using the IdentifiableCandidate schema. Users should provide as much information as possible, including all required fields.
  tags:
    - Candidates
  operationId: registerCandidate
  requestBody:
    description: Candidate information to register with the Talent Catalog
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            registrarId: # todo depending on the api security method, this may not be required
              type: string
              description: The unique identifier of organization supplying the registration data
              example: "registrar-12345"
            registrationData:
              allOf:
                - $ref: ../../components/schemas/v1/CandidateRegistration.yaml

  responses:
    '201':
      description: Candidate successfully registered with the Talent Catalog
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Success message
                example: "Candidate successfully registered."
              publicId:
                type: string
                format: base64-uuid
                description: The unique public ID assigned to the registered candidate
                example: "ABcd2EFgHIjkLMNOp3QR-S"
              registrationId:
                type: string
                format: base64-uuid
                description: The unique registration ID for tracking the candidate's registration
                example: "ABcd2EFgHIjkLMNOp3QR-S"
    '400':
      description: Bad request - Invalid request payload
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/errors/BadRequestBodyError.yaml
    '401':
      description: Unauthorised - Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/errors/UnauthorisedError.yaml
    '403':
      description: Forbidden - Access token does not have the required permissions
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/errors/ForbiddenError.yaml
    '409':
      description: Conflict - Candidate already registered
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/errors/ConflictError.yaml
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/errors/InternalServerError.yaml
